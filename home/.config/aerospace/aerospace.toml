# AeroSpace config
# Modifier key: Alt (Option on Mac)
# Prerequisites: Disable "Displays have separate Spaces" in
#   System Settings > Desktop & Dock > Mission Control

start-at-login = true
automatically-unhide-macos-hidden-apps = true

# Move mouse to focused monitor center on any focus change
on-focus-changed = ['move-mouse monitor-lazy-center']

# Launch borders after startup
after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0'
]

[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8
outer.bottom     = 8

# Workspace 9 on laptop (main), everything else on secondary
[workspace-to-monitor-force-assignment]
1  = 'secondary'
2  = 'secondary'
3  = 'secondary'
4  = 'secondary'
5  = 'secondary'
6  = 'secondary'
7  = 'secondary'
8  = 'secondary'
9  = 'main'
10 = 'secondary'

[mode.main.binding]

# Focus window (jkl; = left/down/up/right)
alt-j         = 'focus left'
alt-k         = 'focus down'
alt-l         = 'focus up'
alt-semicolon = 'focus right'

alt-left  = 'focus left'
alt-down  = 'focus down'
alt-up    = 'focus up'
alt-right = 'focus right'

# Move window
alt-shift-j         = 'move left'
alt-shift-k         = 'move down'
alt-shift-l         = 'move up'
alt-shift-semicolon = 'move right'

alt-shift-left  = 'move left'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'
alt-shift-right = 'move right'

# Focus monitor
alt-comma  = 'focus-monitor --wrap-around left'
alt-period = 'focus-monitor --wrap-around right'

# Move window to monitor and follow focus
alt-shift-comma  = ['move-node-to-monitor --wrap-around left',  'focus-monitor --wrap-around left']
alt-shift-period = ['move-node-to-monitor --wrap-around right', 'focus-monitor --wrap-around right']

# Move workspace to monitor
alt-ctrl-comma  = 'move-workspace-to-monitor --wrap-around left'
alt-ctrl-period = 'move-workspace-to-monitor --wrap-around right'

# Resize smart
alt-o = 'resize smart -50'
alt-p = 'resize smart +50'

# Layout toggles
alt-slash     = 'layout tiles horizontal vertical'
alt-backslash = 'layout accordion horizontal vertical'

# Fullscreen (AeroSpace-managed, not macOS native)
alt-f = 'fullscreen'

# Float / tile toggle
alt-shift-f = 'layout floating tiling'

# Balance window sizes
alt-shift-b = 'balance-sizes'

# Switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace and follow
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

# Jump to previous workspace
alt-tab = 'workspace-back-and-forth'

# Reload config
alt-shift-r = 'reload-config'

# Keep JankyBorders out of tiling management
[[on-window-detected]]
if.app-id = 'com.knighton.borders'
run = ['layout floating']
