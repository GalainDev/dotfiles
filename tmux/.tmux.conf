# Prefix: Ctrl+b (default)

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes preserving current path
# h = horizontal split, n = vertical split (mirrors AeroSpace layout feel)
bind h split-window -h -c "#{pane_current_path}"
bind n split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with jkl; (matches AeroSpace)
bind j select-pane -L
bind k select-pane -D
bind l select-pane -U
bind \; select-pane -R

# Mouse support
set -g mouse on
set -g set-clipboard on

# Mouse drag to clipboard via pbcopy
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Better colors
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# No delay on escape
set -sg escape-time 0

# Increase scrollback
set -g history-limit 10000

# Status bar
set -g status-position bottom
set -g status-style 'bg=black fg=white'
set -g status-left '#[fg=green]#S '
set -g status-right '#[fg=yellow]%H:%M'

# Plugins (requires TPM — clone with:)
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM — keep this at the very bottom
run '~/.tmux/plugins/tpm/tpm'
